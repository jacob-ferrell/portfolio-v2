server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed assets if available
    gzip_static on;

    # Cache static assets aggressively (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Always serve index.html for any path (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
