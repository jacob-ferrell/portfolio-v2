services:
  portfolio:
    build: .
    container_name: portfolio
    restart: unless-stopped
    # No ports exposed to the host — only reachable inside the Docker network.
    # In the Cloudflare Tunnel dashboard, set the service URL to: http://portfolio:3741
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - internal
    depends_on:
      - portfolio

networks:
  internal:
    driver: bridge
